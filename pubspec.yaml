name: staff_art
description: Staff Art - Art Platform
publish_to: "none"
version: 1.0.0+13

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.4.0
  provider: ^6.1.1
  flutter_secure_storage: ^9.0.0
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  intl: ^0.20.2
  share_plus: ^12.0.1
  socket_io_client: ^3.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.0

flutter_native_splash:
  color: "#0B0C0E"
  image: assets/images/logo.jpg
  android_12:
    color: "#0B0C0E"
    image: assets/images/logo.jpg

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.jpg"

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.jpg

